rules_version: bank_rules.v1.7
hard_blocks:
  - code: BLOCK_INVALID_INPUT
    trigger: "Campo obrigatório em falta, tipo inválido, schema_version inválido ou enum inválido"
  - code: BLOCK_NOT_ELIGIBLE
    trigger: "Payload inelegível para banca ou pool_status fora de exported_to_bankroll"
  - code: BLOCK_DUPLICATE_FIXTURE
    trigger: "event_id já bloqueado por decisão anterior aprovada"
  - code: BLOCK_DAILY_LIMIT
    trigger: "daily_exposure_after_if_accepted > daily_limit_u"
  - code: BLOCK_MODULE_LIMIT
    trigger: "module_exposure_after_if_accepted > module_limit_u"
  - code: BLOCK_ODD_RANGE
    trigger: "odds fora da janela operacional da banca"
  - code: BLOCK_MIN_STAKE
    trigger: "stake_approved < min_effective_stake_u"
  - code: BLOCK_BANK_PROTECTION_MODE
    trigger: "bank_state_mode=Protecao_Maxima e pick não qualifica como premium"
soft_reductions:
  - code: REDUCE_HIGH_RISK
    trigger: "risk_norm >= 4"
    suggested_cut_pct: 25
  - code: REDUCE_DAY_EXPOSURE
    trigger: "daily exposure já em day_medium/day_high"
    suggested_cut_pct: 15
  - code: REDUCE_MODULE_EXPOSURE
    trigger: "módulo já com carga relevante no dia"
    suggested_cut_pct: 15
  - code: REDUCE_BANK_ALERT
    trigger: "bank_state_mode=Alerta"
    suggested_cut_pct: 10
  - code: REDUCE_PARTIAL_CORRELATION
    trigger: "correlation_flags presentes mas não bloqueantes"
    suggested_cut_pct: 15
reserve_policy:
  enabled: true
  use_cases:
    - "payload válido mas não acionável por contexto prudencial"
    - "watchlist forte sem janela ótima de execução"
    - "slot de execução preferido ocupado por prioridade superior"
decision_statuses: [APPROVED, APPROVED_REDUCED, BLOCKED, RESERVE]
