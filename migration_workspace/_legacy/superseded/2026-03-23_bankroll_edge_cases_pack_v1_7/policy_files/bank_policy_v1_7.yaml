policy_version: bank_policy.v1.7
module: bankroll_risk_manager
status: staging
purpose: "Congelar política operacional da banca sobre payload normalizado do GPS"
input_contract:
  accepted_schema: selector_pick.v1.1
  required_pool_status: exported_to_bankroll
  accepted_module_ids: [v12, corners, btts, cards]
  accepted_market_families: [goals, btts, corners, cards]
thresholds:
  min_effective_stake_u: 0.25
  max_stake_per_pick_u: 1.50
  daily_limit_u: 5.00
  module_limit_u: 3.00
  odds_window:
    min: 1.20
    max: 2.40
stake_base_by_priority_tier:
  Best: 1.25
  Top: 1.00
  Actionable: 0.75
  Watchlist: 0.50
  Reject: 0.00
bank_state_modes:
  Normal:
    multiplier: 1.00
    description: "Operação standard"
  Alerta:
    multiplier: 0.90
    description: "Redução leve por prudência"
  Defesa:
    multiplier: 0.75
    description: "Redução forte e filtro mais apertado"
  Protecao_Maxima:
    multiplier: 0.50
    description: "Só casos premium podem sobreviver"
fixture_policy:
  single_fixture_entry: true
  lock_on_approved: true
portfolio_groups: [core, satellite, optional]
exposure_buckets: [day_low, day_medium, day_high, day_critical]
