version: bank_policy.v1.8
status: staging
consumes_from: gps_shortlist_batch.v1
produces:
  - bankroll_response_batch.v1.8
  - execution_intake_candidate.v1.8
bank_state_modes:
  - Normal
  - Alerta
  - Defesa
  - Protecao_Maxima
priority_to_stake_base:
  Best: 1.25
  Top: 1.00
  Actionable: 0.75
  Watchlist: 0.50
  Reject: 0.00
limits:
  daily_limit_u: 5.00
  module_limit_u: 3.00
  min_effective_stake_u: 0.25
  duplicate_fixture_policy: block
  odds_min: 1.20
  odds_max: 2.40
execution_rules:
  approved_statuses:
    - APPROVED
    - APPROVED_REDUCED
  reserve_blocks_execution: true
  blocked_blocks_execution: true
