rules_version: bank_rules.v1.5
hard_blocks:
  - code: BLOCK_INVALID_INPUT
    trigger: missing_required_field_or_invalid_schema
  - code: BLOCK_NOT_ELIGIBLE
    trigger: payload_marked_ineligible
  - code: BLOCK_DUPLICATE_FIXTURE
    trigger: event_id_already_locked
  - code: BLOCK_DAILY_LIMIT
    trigger: daily_exposure_after_if_accepted_gt_limit
  - code: BLOCK_MODULE_LIMIT
    trigger: module_exposure_after_if_accepted_gt_limit
  - code: BLOCK_ODD_RANGE
    trigger: odds_outside_operational_window
  - code: BLOCK_MIN_STAKE
    trigger: stake_approved_lt_min_effective_stake
  - code: BLOCK_BANK_PROTECTION_MODE
    trigger: bank_state_mode_is_protection_maxima_and_pick_not_allowed
soft_reductions:
  - code: REDUCE_HIGH_RISK
    trigger: risk_norm_gte_4
  - code: REDUCE_DAY_EXPOSURE
    trigger: day_exposure_bucket_medium_or_high
  - code: REDUCE_MODULE_EXPOSURE
    trigger: module_exposure_relevant
  - code: REDUCE_BANK_ALERT
    trigger: bank_state_mode_is_alerta
  - code: REDUCE_PARTIAL_CORRELATION
    trigger: non_blocking_correlation_flags_present
status_resolution_order:
  - validate_input
  - validate_pool_status
  - validate_fixture_lock
  - validate_limits
  - compute_stake_base
  - compute_stake_suggested
  - apply_soft_reductions
  - compute_stake_approved
  - resolve_decision_status
  - emit_schema_c
