pack_version: bank_decision_rules.v2.1
validation:
  required_fields:
    - selector_schema_version
    - pick_id
    - module_id
    - module_version
    - event_id
    - match_label
    - market_family
    - market
    - selection
    - odds
    - global_score
    - confidence_norm
    - risk_norm
    - edge_norm
    - priority_tier
    - executive_rationale
    - pool_status
    - normalization_version
  pool_status_required: exported_to_bankroll
  confidence_norm_range: [1, 5]
  risk_norm_range: [1, 5]
  global_score_range: [0, 100]
  enums:
    module_id: [v12, corners, btts, cards]
    market_family: [goals, btts, corners, cards]
    edge_norm: [weak, acceptable, strong, very_strong]
    priority_tier: [Best, Top, Actionable, Watchlist, Reject]
    decision_status: [APPROVED, APPROVED_REDUCED, BLOCKED, RESERVE]
hard_blocks:
  - code: BLOCK_INVALID_INPUT
    trigger: missing_required_field_or_invalid_type_or_invalid_enum
  - code: BLOCK_NOT_ELIGIBLE
    trigger: explicit_selector_ineligibility_or_reject_priority
  - code: BLOCK_DUPLICATE_FIXTURE
    trigger: approved_or_locked_pick_for_same_event_id
  - code: BLOCK_DAILY_LIMIT
    trigger: daily_exposure_after_if_accepted_exceeds_limit
  - code: BLOCK_MODULE_LIMIT
    trigger: module_exposure_after_if_accepted_exceeds_limit
  - code: BLOCK_ODD_RANGE
    trigger: odds_outside_operational_window
  - code: BLOCK_MIN_STAKE
    trigger: stake_approved_below_min_effective_stake
  - code: BLOCK_BANK_PROTECTION_MODE
    trigger: bank_mode_protection_and_non_premium_pick
soft_reductions:
  - code: REDUCE_HIGH_RISK
    trigger: risk_norm_gte_4
  - code: REDUCE_DAY_EXPOSURE
    trigger: day_exposure_bucket_medium_or_high
  - code: REDUCE_MODULE_EXPOSURE
    trigger: module_exposure_relevant
  - code: REDUCE_BANK_ALERT
    trigger: bank_state_mode_alert
  - code: REDUCE_PARTIAL_CORRELATION
    trigger: partial_correlation_non_blocking
resolution_order:
  - validate_input
  - validate_pool_status
  - check_fixture_lock
  - check_daily_limit
  - check_module_limit
  - compute_stake_base
  - compute_stake_suggested
  - apply_soft_reductions
  - enforce_min_effective_stake
  - emit_decision
