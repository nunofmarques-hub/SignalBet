<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SignalBet UI v11</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/logo-signalbet-radar-focus.svg" alt="SignalBet" class="logo" />
        <div>
          <div class="brand-name">SignalBet</div>
          <div class="brand-sub">Integration Surface v11</div>
        </div>
      </div>
      <nav>
        <button data-page="home">Home</button>
        <button data-page="pool">Opportunity Pool</button>
        <button data-page="bankroll">Banca</button>
        <button data-page="execution">Execution</button>
        <button data-page="history">Histórico</button>
      </nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h1 id="page-title">Home</h1>
          <p id="page-subtitle">Camada visual pronta para snapshots reais</p>
        </div>
        <section id="run-panel" class="run-panel"></section>
      </header>
      <section id="content"></section>
    </main>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
