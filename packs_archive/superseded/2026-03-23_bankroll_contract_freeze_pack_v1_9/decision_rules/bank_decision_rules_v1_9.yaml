version: bank_decision_rules.v1.9
status: staging
input_contract: gps_shortlist_batch_contract.v1.9
output_contracts:
- bankroll_response_batch_contract.v1.9
- execution_intake_final_contract.v1.9
validation:
  hard_required_batch:
  - batch_schema_version
  - selector_run_id
  - generated_at
  - normalization_version
  - shortlist_size
  - picks
  hard_required_pick:
  - selector_schema_version
  - pick_id
  - module_id
  - module_version
  - event_id
  - match_label
  - market_family
  - market
  - selection
  - odds
  - global_score
  - confidence_norm
  - risk_norm
  - edge_norm
  - priority_tier
  - executive_rationale
  - pool_status
  - normalization_version
  batch_schema_must_equal: gps_shortlist_batch.v1
  selector_schema_must_equal: selector_pick.v1.1
  pool_status_must_equal: exported_to_bankroll
  confidence_norm_range:
  - 1
  - 5
  risk_norm_range:
  - 1
  - 5
  global_score_range:
  - 0
  - 100
  module_id_enum:
  - v12
  - corners
  - btts
  - cards
  market_family_enum:
  - goals
  - btts
  - corners
  - cards
  edge_norm_enum:
  - weak
  - acceptable
  - strong
  - very_strong
  priority_tier_enum:
  - Best
  - Top
  - Actionable
  - Watchlist
  - Reject
  line_required_when_market_has_line: true
  selector_decision_note_recommended: true
  conflict_flags_recommended: true
  correlation_flags_recommended: true
hard_blocks:
- BLOCK_INVALID_INPUT
- BLOCK_NOT_ELIGIBLE
- BLOCK_DUPLICATE_FIXTURE
- BLOCK_DAILY_LIMIT
- BLOCK_MODULE_LIMIT
- BLOCK_ODD_RANGE
- BLOCK_MIN_STAKE
- BLOCK_BANK_PROTECTION_MODE
soft_reductions:
- REDUCE_HIGH_RISK
- REDUCE_DAY_EXPOSURE
- REDUCE_MODULE_EXPOSURE
- REDUCE_BANK_ALERT
- REDUCE_PARTIAL_CORRELATION
decision_logic:
  Reject_priority_tier: BLOCK_NOT_ELIGIBLE
  Watchlist_priority_tier: RESERVE_UNLESS_MANUALLY_ESCALATED
  partial_correlation: APPROVED_REDUCED
  duplicate_fixture: BLOCKED
  protection_mode_non_best: BLOCKED
decision_flow:
- validate_batch
- validate_pick
- check_priority_gate
- check_fixture_lock
- check_day_limit
- check_module_limit
- check_odds_window
- compute_stake_base
- compute_stake_suggested
- apply_risk_edge_state_reductions
- check_min_effective_stake
- decide_status
- emit_bankroll_response
- emit_execution_payload_if_actionable
