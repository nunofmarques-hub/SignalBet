version: bank_rules.v23
hard_blocks:
  - BLOCK_INVALID_INPUT
  - BLOCK_NOT_ELIGIBLE
  - BLOCK_DUPLICATE_FIXTURE
  - BLOCK_DAILY_LIMIT
  - BLOCK_MODULE_LIMIT
  - BLOCK_ODD_RANGE
  - BLOCK_MIN_STAKE
  - BLOCK_BANK_PROTECTION_MODE
soft_reductions:
  - REDUCE_HIGH_RISK
  - REDUCE_DAY_EXPOSURE
  - REDUCE_MODULE_EXPOSURE
  - REDUCE_BANK_ALERT
  - REDUCE_PARTIAL_CORRELATION
decision_logic:
  approved:
    requires:
      - valid_contract
      - exported_to_bankroll
      - fixture_unlocked
      - stake_approved_ge_min
  approved_reduced:
    requires:
      - valid_contract
      - reduction_applied
  blocked:
    triggers:
      - any_hard_block
  reserve:
    triggers:
      - prudential_hold
      - non_premium_in_protection
