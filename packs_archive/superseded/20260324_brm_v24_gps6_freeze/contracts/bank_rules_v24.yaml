version: bank_rules.v24
upstream_official: gps.v6
hard_blocks:
  - BLOCK_INVALID_INPUT
  - BLOCK_NOT_ELIGIBLE
  - BLOCK_DUPLICATE_FIXTURE
  - BLOCK_DAILY_LIMIT
  - BLOCK_MODULE_LIMIT
  - BLOCK_ODD_RANGE
  - BLOCK_MIN_STAKE
  - BLOCK_BANK_PROTECTION_MODE
  - BLOCK_REJECT_PRIORITY
soft_reductions:
  - REDUCE_HIGH_RISK
  - REDUCE_DAY_EXPOSURE
  - REDUCE_MODULE_EXPOSURE
  - REDUCE_BANK_ALERT
  - REDUCE_PARTIAL_CORRELATION
  - REDUCE_WEAK_EDGE
contract_freeze_points:
  - gps_to_bank.v24 frozen for GPS v6 handoff
  - bank_resp.v24 frozen for execution corridor
  - bank_to_exec.v24 frozen for execution intake
routing:
  APPROVED:
    execution_ready: true
    route_to_execution: true
  APPROVED_REDUCED:
    execution_ready: true
    route_to_execution: true
  BLOCKED:
    execution_ready: false
    route_to_execution: false
  RESERVE:
    execution_ready: false
    route_to_execution: false
decision_logic:
  approved:
    requires:
      - valid_contract
      - exported_to_bankroll
      - fixture_unlocked
      - priority_tier_not_reject
      - odds_inside_window
      - stake_approved_ge_min
  approved_reduced:
    requires:
      - valid_contract
      - reduction_applied
      - route_to_execution_true
  blocked:
    triggers:
      - any_hard_block
  reserve:
    triggers:
      - prudential_hold
      - non_premium_in_protection
      - watchlist_with_no_capacity
